<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alke Wallet - Agregar contacto</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
    <link href="assets/css/styles.css" rel="stylesheet" type="text/css">
</head>
<body class="text-center mt-5">

    <header>
        <h1>Alke Wallet</h1>
        <nav>
            <a href="menu.html" class="btn btn-primary">Mi Wallet</a>
            <a href="deposit.html" class="btn btn-secondary">Depositar dinero</a>
            <a href="sendmoney.html" class="btn btn-warning">Enviar dinero</a>
            <a href="transactions.html" class="btn btn-dark">Historial de transacciones</a>
            <a href="profile.html" class="btn btn-dark">Perfil</a>
            <button type="button" id="btnLogout" class="btn btn-danger">Cerrar Sesión</button>
        </nav>
    </header>

    <main>
        <h2>Agregar nuevo destinatario</h2>
        <hr>
        <form action="#" method="post">
            <label for="nombre">Nombre completo:</label>
            <input type="text" id="nombre" name="nombre" required>
            <br><br>

            <label for="rut">RUT:</label>
            <input type="text" id="rut" name="rut" placeholder="12.345.678-9" required>
            <br><br>

            <label for="email">Correo electrónico:</label>
            <input type="email" id="email" name="email">
            <br><br>

            <label for="telefono">Teléfono:</label>
            <input type="tel" id="telefono" name="telefono" placeholder="+56 9 1234 5678">
            <br><br>

            <button type="submit" class="btn btn-primary">Guardar destinatario</button>
            <button type="reset" class="btn btn-primary">Limpiar formulario</button>
        </form>

        <br>
        <a href="sendmoney.html" class="btn btn-warning">Volver a mis destinatarios</a>

    </main>

    <br>
    <footer>
        <p>Alke Wallet - Todos los derechos reservado 2026</p>
    </footer>
    
    <script src="assets/js/contacts.js"></script>
    
</body>
</html>
