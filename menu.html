<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alke Wallet - Menú</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
    <link href="assets/css/styles.css" rel="stylesheet" type="text/css">
</head>
<body class="text-center mt-5">
    <!-- Pantalla del menú principal

    Implementar formularios con validaciones básicas
    
    -->

    <header>
        <h1>Alke Wallet</h1>
        <nav>
            <a href="menu.html" class="btn btn-primary">Mi Wallet</a>
            <a href="deposit.html" class="btn btn-secondary">Depositar dinero</a>
            <a href="sendmoney.html" class="btn btn-warning">Enviar dinero</a>
            <a href="transactions.html" class="btn btn-dark">Historial de transacciones</a>

            <button type="button" id="btnLogout" class="btn btn-danger">Cerrar Sesión</button>

    <div class="card saldo-card">
        <p></p>
        <h2>Menú Principal</h2>
        <div class="form-group">
        <label for="balance">Saldo disponible:</label>
        <h2 id="balance">0</h2>
        <label for="amount">Cantidad:</label>
        <input type="number" id="amount">
        <button id="depositBtn" class="btn btn-primary">Depositar</button>
        <button id="withdrawBtn" class="btn btn-primary">Retirar</button>
        </div>
    </div>

    <br>
    <footer>
        <p>Alke Wallet - Todos los derechos reservado 2026</p>
    </footer>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
