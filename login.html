<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alke Wallet - Iniciar sesión</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
    <link href="assets/css/styles.css" rel="stylesheet" type="text/css">
</head>
<body class="text-center mt-5">

    <!-- Pantalla de inicio de sesión y validación de credenciales -->
    
    <div class="container">
        <h1>Iniciar sesión</h1>
        <p class="text-muted"><small>Credenciales de prueba: <strong>admin@alke.cl</strong> / <strong>12345</strong></small></p>

        <div id="loginBox">
            <div class="form-group">
                <label>Correo electrónico:</label>
                <input type="email" class="form-control" id="email" placeholder="Ingrese correo electrónico" required>
            </div>
            
            <div class="form-group">
                <label>Contraseña:</label>
                <input type="password" class="form-control" id="password" placeholder="Ingrese contraseña" required>
            </div>
            
            <button type="button" id="btnLogin" class="btn btn-success">Ingresar</button>
        </div>
        
    </div>

    <br>
    <footer>
        <p>Alke Wallet - Todos los derechos reservado 2026</p>
    </footer>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="assets/js/auth.js"></script>

</body>
</html>
